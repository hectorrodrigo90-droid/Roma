<!DOCTYPE html>
<html lang="es-MX">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#161412">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<title>Roma · Coach</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Playfair+Display:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   ROMA — grises fríos + rojo único
   Todo controlado por JS, no por el LLM
═══════════════════════════════════════════ */
:root{
  --r0:hsl(220,8%,10%);
  --r1:hsl(220,7%,13%);
  --r2:hsl(220,7%,16%);
  --r3:hsl(220,6%,20%);
  --r4:hsl(220,5%,26%);
  --r5:hsl(220,5%,36%);
  --r6:hsl(220,4%,50%);
  --r7:hsl(220,4%,66%);
  --r8:hsl(220,3%,80%);
  --r9:hsl(220,3%,92%);
  --red:#e8412a;
  --red-dim:rgba(232,65,42,.55);
  --red-glow:rgba(232,65,42,.15);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--r0)}
body{font-family:'DM Mono',monospace;display:flex;flex-direction:column;height:100dvh;color:var(--r8)}

/* ── HEADER ── */
.hdr{
  flex-shrink:0;padding:12px 16px 10px;
  background:var(--r1);
  border-bottom:1px solid var(--r3);
  display:flex;align-items:center;justify-content:space-between;
  position:relative;
}
.hdr::after{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--red) 30%,rgba(255,120,80,.9) 50%,var(--red) 70%,transparent);
  animation:linebreath 3s ease-in-out infinite;
}
@keyframes linebreath{0%,100%{opacity:.55}50%{opacity:1}}
.hdr-l{display:flex;align-items:center;gap:11px}
.logo{
  width:38px;height:38px;border-radius:13px;flex-shrink:0;
  background:var(--r2);border:1px solid var(--r4);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:500;color:var(--red);letter-spacing:.1em;
}
.hdr-title{font-size:13px;font-weight:500;letter-spacing:.2em;color:var(--r8)}
.hdr-sub{font-size:7px;color:var(--r5);letter-spacing:.1em;margin-top:2px;line-height:1}
.hdr-r{display:flex;gap:6px;align-items:center}
.session-badge{
  font-size:7px;padding:3px 10px;border-radius:20px;
  background:var(--red-glow);color:var(--red);
  border:1px solid rgba(232,65,42,.25);letter-spacing:.08em;
  display:none;animation:badgepulse 2s ease-in-out infinite;
}
.session-badge.show{display:block}
@keyframes badgepulse{0%,100%{opacity:.6}50%{opacity:1}}
.hdr-btn{
  width:30px;height:30px;border-radius:9px;
  background:var(--r2);border:1px solid var(--r3);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;cursor:pointer;color:var(--r6);
}

/* ── PANTALLA INICIO ── */
#screen-inicio{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;gap:20px;background:var(--r0);overflow-y:auto;
}
.inicio-rutina-card{
  width:100%;max-width:360px;
  background:var(--r1);border:1px solid var(--r3);border-radius:18px;padding:20px;
}
.inicio-dia{font-size:7px;color:var(--red-dim);letter-spacing:.2em;margin-bottom:6px}
.inicio-nombre{font-size:20px;font-weight:300;color:var(--r9);font-family:'Playfair Display',serif;margin-bottom:4px}
.inicio-meta{font-size:9px;color:var(--r6);letter-spacing:.06em;margin-bottom:16px}
.inicio-ex-preview{display:flex;flex-direction:column;gap:6px;margin-bottom:18px}
.inicio-ex-row{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--r2);border-radius:10px}
.inicio-ex-num{font-size:8px;color:var(--red-dim);letter-spacing:.06em;width:16px}
.inicio-ex-name{font-size:12px;color:var(--r7);flex:1}
.inicio-ex-detail{font-size:8px;color:var(--r5);letter-spacing:.04em}
.btn-start{
  width:100%;padding:14px;
  background:rgba(232,65,42,.08);border:1px solid rgba(232,65,42,.3);
  border-radius:14px;color:var(--red);
  font-family:'DM Mono',monospace;font-size:11px;font-weight:500;
  letter-spacing:.12em;cursor:pointer;transition:.15s;
}
.btn-start:active{background:rgba(232,65,42,.14);transform:scale(.97)}
.descanso-card{
  width:100%;max-width:360px;
  background:var(--r1);border:1px solid var(--r3);border-radius:18px;
  padding:20px;text-align:center;
  font-size:13px;color:var(--r6);line-height:1.6;
  display:none;
}

/* ── PANTALLA SESIÓN ── */
#screen-sesion{
  flex:1;display:none;flex-direction:column;overflow:hidden;background:var(--r0);
}

/* Card ejercicio */
.ex-card{
  flex-shrink:0;margin:12px 14px 0;
  background:var(--r1);border:1px solid var(--r3);border-radius:16px;
  overflow:hidden;
}
.ex-gif{
  width:100%;height:160px;object-fit:cover;display:block;
  background:var(--r2);
}
.ex-gif-placeholder{
  width:100%;height:120px;background:var(--r2);
  display:flex;align-items:center;justify-content:center;
  font-size:40px;
}
.ex-info{padding:12px 14px 10px}
.ex-eyebrow{font-size:7px;color:var(--r5);letter-spacing:.18em;margin-bottom:5px}
.ex-name{font-size:19px;font-weight:300;color:var(--r9);font-family:'Playfair Display',serif;margin-bottom:3px}
.ex-meta{font-size:8.5px;color:var(--r5);letter-spacing:.05em;margin-bottom:10px}
.ex-tip{font-size:10.5px;color:var(--r6);line-height:1.5;margin-bottom:8px;padding-left:9px;border-left:2px solid rgba(232,65,42,.25)}
.ex-target{font-size:11.5px;color:var(--red-dim);font-weight:600;letter-spacing:.02em;margin-bottom:9px}
.quick-chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;-webkit-overflow-scrolling:touch}
.quick-chips::-webkit-scrollbar{display:none}
.qchip{
  flex-shrink:0;background:var(--r1);border:1px solid var(--r3);color:var(--r6);
  font-size:11px;padding:7px 12px;border-radius:20px;white-space:nowrap;
}
.qchip:active{background:var(--r2);border-color:rgba(232,65,42,.3)}
.ex-dots{display:flex;gap:4px;margin-bottom:8px}
.ex-dot{flex:1;height:3px;border-radius:10px;background:var(--r3)}
.ex-dot.done{background:var(--red);opacity:.55}
.ex-dot.now{background:var(--red);animation:dotnow 1.2s ease-in-out infinite}
@keyframes dotnow{0%,100%{opacity:.35}50%{opacity:1;box-shadow:0 0 7px var(--red)}}
.ex-chips{display:flex;gap:5px;flex-wrap:wrap}
.chip{
  padding:3px 9px;border-radius:20px;font-size:8px;
  background:var(--r2);border:1px solid var(--r4);color:var(--r6);
  letter-spacing:.04em;
}
.chip.red{background:rgba(232,65,42,.06);border-color:rgba(232,65,42,.2);color:var(--red-dim)}

/* Scroll body de sesión */
.sesion-body{
  flex:1;overflow-y:auto;padding:12px 14px;
  display:flex;flex-direction:column;gap:10px;
  -webkit-overflow-scrolling:touch;
}
.sesion-body::-webkit-scrollbar{display:none}

/* TIMER — el protagonista */
.timer-card{
  background:var(--r1);border:1px solid var(--r3);border-radius:18px;
  padding:24px 16px 20px;text-align:center;
  position:relative;overflow:hidden;
  display:none;flex-direction:column;align-items:center;
  flex-shrink:0;
}
.timer-card.show{display:flex}
.timer-card::before{
  content:'';position:absolute;top:-50px;left:50%;transform:translateX(-50%);
  width:200px;height:100px;
  background:radial-gradient(ellipse,rgba(232,65,42,.12) 0%,transparent 70%);
  animation:glowbreath 2s ease-in-out infinite;pointer-events:none;
}
@keyframes glowbreath{0%,100%{opacity:.5}50%{opacity:1}}
.timer-lbl{font-size:8px;letter-spacing:.28em;color:var(--r5);margin-bottom:4px;position:relative}
.timer-num{
  font-size:78px;font-weight:300;color:var(--red);
  line-height:1;letter-spacing:-.04em;position:relative;
  animation:timerfire 1s ease-in-out infinite;
}
@keyframes timerfire{
  0%,100%{text-shadow:0 0 35px rgba(232,65,42,.3),0 0 70px rgba(232,65,42,.1)}
  50%{text-shadow:0 0 55px rgba(232,65,42,.6),0 0 110px rgba(232,65,42,.22)}
}
.timer-of{font-size:8px;letter-spacing:.2em;color:var(--r4);margin-top:4px;position:relative}
.timer-bar{
  position:absolute;bottom:14px;left:22px;right:22px;
  height:2px;background:var(--r3);border-radius:10px;overflow:hidden;
}
.timer-fill{
  height:100%;width:100%;
  background:linear-gradient(90deg,rgba(140,15,5,.6),var(--red));
  border-radius:10px;transition:width .5s linear;
  box-shadow:0 0 8px rgba(232,65,42,.4);
  position:relative;
}
.timer-cursor{
  position:absolute;right:-1px;top:-3px;bottom:-3px;
  width:3px;border-radius:10px;background:#fff;opacity:.5;
  box-shadow:0 0 8px rgba(255,255,255,.7);
  animation:cursorpulse 1s ease-in-out infinite;
}
@keyframes cursorpulse{0%,100%{opacity:.35}50%{opacity:.75}}

/* Coach — hilo real, scrolleable, con burbujas de usuario y de Roma */
.coach-thread{
  display:flex;flex-direction:column;gap:8px;
  max-height:38vh;overflow-y:auto;-webkit-overflow-scrolling:touch;
  flex-shrink:0;padding-right:2px;
}
.coach-thread::-webkit-scrollbar{display:none}
.coach-msg{
  border-radius:0 13px 13px 13px;
  padding:11px 13px;
  font-size:13px;line-height:1.6;
  max-width:92%;
}
.coach-msg.roma{
  background:var(--r1);border:1px solid var(--r3);
  border-left:2px solid rgba(232,65,42,.3);
  color:var(--r7);align-self:flex-start;
}
.coach-msg.user{
  background:var(--r2);border:1px solid var(--r4);
  border-radius:13px 0 13px 13px;
  color:var(--r8);align-self:flex-end;
}
.coach-msg.typing{opacity:.5;font-style:italic}
.coach-tag{font-size:6.5px;color:var(--r5);letter-spacing:.16em;display:block;margin-bottom:5px}

/* Historial de sets */
.hist-title{font-size:7px;color:var(--r4);letter-spacing:.16em;margin-top:4px;margin-bottom:4px}
.hist-sets{display:flex;flex-wrap:wrap;gap:5px}
.hist-chip{
  padding:4px 10px;border-radius:20px;font-size:8.5px;
  background:rgba(232,65,42,.06);border:1px solid rgba(232,65,42,.15);
  color:rgba(232,65,42,.6);
}

/* Botones de set */
.set-btns{display:flex;gap:8px;flex-shrink:0;display:none}
.set-btns.show{display:flex}
.set-btn{
  flex:1;padding:14px 6px;border-radius:14px;
  font-family:'DM Mono',monospace;font-size:9.5px;font-weight:400;
  cursor:pointer;border:1px solid;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  letter-spacing:.05em;transition:.15s;
}
.set-btn:active{transform:scale(.94)}
.set-btn-ico{font-size:18px;line-height:1}
.btn-ok{background:var(--r2);border-color:var(--r4);color:var(--r6)}
.btn-up{background:rgba(232,65,42,.06);border-color:rgba(232,65,42,.22);color:rgba(232,65,42,.7)}
.btn-dn{background:var(--r2);border-color:var(--r4);color:var(--r5)}

/* Footer */
.footer{
  flex-shrink:0;padding:10px 14px 24px;
  background:var(--r1);border-top:1px solid var(--r3);
}
.inp-row{display:flex;gap:8px}
.inp{
  flex:1;background:var(--r2);border:1px solid var(--r4);
  border-radius:14px;color:var(--r8);
  font-family:'DM Mono',monospace;font-size:14px;font-weight:300;
  padding:11px 14px;outline:none;-webkit-appearance:none;transition:.2s;
}
.inp:focus{border-color:var(--r6)}
.inp::placeholder{color:var(--r4)}
.send-btn{
  padding:11px 17px;
  background:var(--r2);border:1px solid var(--r4);
  border-radius:14px;color:var(--red);font-size:16px;cursor:pointer;
  animation:sendfire 3s ease-in-out infinite;
}
@keyframes sendfire{0%,100%{box-shadow:none}50%{box-shadow:0 0 16px rgba(232,65,42,.1)}}

/* ── PANTALLA HISTORIAL ── */
#screen-hist{
  flex:1;display:none;flex-direction:column;overflow:hidden;background:var(--r0);
}
.hist-body{flex:1;overflow-y:auto;padding:14px}
.hist-sesion-card{
  background:var(--r1);border:1px solid var(--r3);border-radius:14px;
  padding:14px;margin-bottom:10px;
}
.hist-sesion-fecha{font-size:7px;color:var(--r5);letter-spacing:.14em;margin-bottom:4px}
.hist-sesion-rutina{font-size:15px;font-weight:300;color:var(--r8);font-family:'Playfair Display',serif;margin-bottom:10px}
.hist-ex-item{padding:6px 0;border-bottom:1px solid var(--r2);font-size:11px;color:var(--r6)}
.hist-ex-item:last-child{border-bottom:none}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
  background:var(--r3);color:var(--r8);
  font-size:11px;padding:8px 16px;border-radius:20px;
  border:1px solid var(--r4);letter-spacing:.04em;
  opacity:0;transition:opacity .25s;pointer-events:none;z-index:999;white-space:nowrap;
}
#toast.show{opacity:1}

/* ── PANTALLA DESCANSO ── */
#screen-descanso{
  display:none;position:fixed;inset:0;z-index:100;
  background:var(--r0);flex-direction:column;align-items:center;justify-content:center;
  gap:0;
}
#screen-descanso.show{display:flex}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-l">
    <div class="logo">RM</div>
    <div>
      <div class="hdr-title">ROMA</div>
      <div class="hdr-sub" id="hdr-sub">Lista para entrenar</div>
    </div>
  </div>
  <div class="hdr-r">
    <span class="session-badge" id="session-badge">● SESIÓN</span>
    <div class="hdr-btn" onclick="showScreen('hist')" title="Historial">📊</div>
    <div class="hdr-btn" onclick="showScreen('inicio')" title="Inicio">⌂</div>
  </div>
</div>

<!-- ══ PANTALLA: INICIO ══ -->
<div id="screen-inicio">
  <div id="inicio-content" style="width:100%;max-width:360px;display:flex;flex-direction:column;gap:14px"></div>
</div>

<!-- ══ PANTALLA: SESIÓN ══ -->
<div id="screen-sesion">

  <!-- Card ejercicio fijo -->
  <div class="ex-card" id="ex-card" style="display:none">
    <div id="ex-gif-wrap"></div>
    <div class="ex-info">
      <div class="ex-eyebrow" id="ex-eyebrow">EJERCICIO</div>
      <div class="ex-name" id="ex-name">—</div>
      <div class="ex-meta" id="ex-meta"></div>
      <div class="ex-tip" id="ex-tip"></div>
      <div class="ex-target" id="ex-target"></div>
      <div class="ex-dots" id="ex-dots"></div>
      <div class="ex-chips" id="ex-chips"></div>
    </div>
  </div>

  <!-- Body scrollable -->
  <div class="sesion-body" id="sesion-body">

    <!-- Timer — vive aquí, se muestra/oculta -->
    <div class="timer-card" id="timer-card">
      <div class="timer-lbl">DESCANSO</div>
      <div class="timer-num" id="timer-num">0:00</div>
      <div class="timer-of" id="timer-of">DE 0:00</div>
      <div class="timer-bar"><div class="timer-fill" id="timer-fill"><div class="timer-cursor"></div></div></div>
    </div>

    <!-- Coach — hilo real con scroll, no una sola burbuja -->
    <div class="coach-thread" id="coach-thread">
      <span class="coach-tag">ROMA</span>
    </div>
    <div class="coach-msg roma typing" id="coach-typing" style="display:none">···</div>

    <!-- Historial de sets del ejercicio actual -->
    <div id="sets-hist-wrap" style="display:none">
      <div class="hist-title">SETS COMPLETADOS</div>
      <div class="hist-sets" id="sets-hist"></div>
    </div>

    <!-- Botones de set -->
    <div class="set-btns" id="set-btns">
      <button class="set-btn btn-ok" onclick="logSet('ok')">
        <span class="set-btn-ico">✓</span>OK
      </button>
      <button class="set-btn btn-up" onclick="logSet('up')">
        <span class="set-btn-ico">↑</span>SUBÍ
      </button>
      <button class="set-btn btn-dn" onclick="logSet('dn')">
        <span class="set-btn-ico">↓</span>BAJÉ
      </button>
    </div>

  </div>

  <!-- Footer -->
  <div class="footer">
    <div class="quick-chips" id="quick-chips">
      <button class="qchip" onclick="quickAsk('Dame un consejo para este ejercicio')">💡 Consejo</button>
      <button class="qchip" onclick="quickAsk('¿Cómo voy esta semana?')">📊 Cómo voy</button>
      <button class="qchip" onclick="quickAsk('¿Qué sigue después de esto?')">➡️ Qué sigue</button>
      <button class="qchip" onclick="quickAsk('¿Estoy estancado en algo?')">📉 Estancamiento</button>
    </div>
    <div class="inp-row">
      <input class="inp" id="inp" placeholder="Escribe peso y reps, o pregunta algo…"
        onkeydown="if(event.key==='Enter'){sendMsg();event.preventDefault()}">
      <button class="send-btn" onclick="sendMsg()">➤</button>
    </div>
  </div>
</div>

<!-- ══ PANTALLA: HISTORIAL ══ -->
<div id="screen-hist">
  <div class="hist-body" id="hist-body">
    <div style="font-size:8px;color:var(--r5);letter-spacing:.16em;margin-bottom:14px">HISTORIAL DE SESIONES</div>
    <div id="hist-content"></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════
// VERTEX AI — Service Account (mismo que Leonor)
// ═══════════════════════════════════════════════════════
const VERTEX_SA={

let _saToken=null,_saExp=0;
async function getSAToken(){
  if(_saToken&&Date.now()<_saExp) return _saToken;
  const now=Math.floor(Date.now()/1000);
  const b64u=o=>btoa(JSON.stringify(o)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
  const unsigned=`${b64u({alg:'RS256',typ:'JWT'})}.${b64u({iss:VERTEX_SA.client_email,scope:'https://www.googleapis.com/auth/cloud-platform',aud:VERTEX_SA.token_uri,exp:now+3600,iat:now})}`;
  const pem=VERTEX_SA.private_key.replace(/-----BEGIN PRIVATE KEY-----|-----END PRIVATE KEY-----|\n/g,'');
  const der=Uint8Array.from(atob(pem),c=>c.charCodeAt(0));
  const key=await crypto.subtle.importKey('pkcs8',der.buffer,{name:'RSASSA-PKCS1-v1_5',hash:'SHA-256'},false,['sign']);
  const sig=await crypto.subtle.sign('RSASSA-PKCS1-v1_5',key,new TextEncoder().encode(unsigned));
  const jwt=`${unsigned}.${btoa(String.fromCharCode(...new Uint8Array(sig))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'')}`;
  const r=await fetch(VERTEX_SA.token_uri,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:`grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer&assertion=${jwt}`});
  const d=await r.json();
  if(!d.access_token) throw new Error('Token SA falló');
  _saToken=d.access_token;_saExp=Date.now()+55*60*1000;
  return _saToken;
}
async function vertexGenerate(system,contents,maxT=350,temp=0.75){
  const token=await getSAToken();
  const body={contents,generationConfig:{maxOutputTokens:maxT,temperature:temp}};
  if(system) body.system_instruction={parts:[{text:system}]};
  const r=await fetch(`${VERTEX_BASE}/${MODEL}:generateContent`,{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
    body:JSON.stringify(body)
  });
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e?.error?.message||`HTTP ${r.status}`);}
  const d=await r.json();
  const cand=d.candidates?.[0];
  if(!cand) throw new Error('Sin respuesta');
  return cand.content.parts.map(p=>p.text||'').join('').trim();
}

// ═══════════════════════════════════════════════════════
let _db=null;
async function dbOpen(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open('RomaDB',1);
    req.onupgradeneeded=e=>e.target.result.createObjectStore('kv');
    req.onsuccess=e=>{_db=e.target.result;res(_db);}
    req.onerror=()=>rej(req.error);
  });
}
function dbSet(k,v){return new Promise((res,rej)=>{const tx=_db.transaction('kv','readwrite');tx.objectStore('kv').put(v,k);tx.oncomplete=()=>res();tx.onerror=()=>rej();})}
function dbGet(k){return new Promise((res,rej)=>{const tx=_db.transaction('kv','readonly');const req=tx.objectStore('kv').get(k);req.onsuccess=()=>res(req.result??null);req.onerror=()=>rej();})}

// ═══════════════════════════════════════════════════════
// PROGRESIÓN REAL — tonelaje, tendencias, objetivo del próximo set
// Todo esto es cálculo local sobre datos que ya guarda la app.
// Cero llamadas a IA, cero costo, corre instantáneo.
// ═══════════════════════════════════════════════════════
function tonelajeDeSets(sets){ return sets.reduce((sum,s)=>sum+((s.peso||0)*(s.reps||0)),0); }

function todasLasSesiones(){
  // historial cerrado + la sesión activa (si existe) cuenta como "hoy"
  return S.sesionActiva ? [...S.historialSesiones,S.sesionActiva] : S.historialSesiones;
}

function tonelajeSemanal(){
  const ahora=Date.now(), semana=7*24*60*60*1000;
  let actual=0,anterior=0;
  todasLasSesiones().forEach(s=>{
    const f=new Date(s.fecha).getTime();
    const ton=tonelajeDeSets(s.sets);
    if(ahora-f<=semana) actual+=ton;
    else if(ahora-f<=semana*2) anterior+=ton;
  });
  return {actual:Math.round(actual),anterior:Math.round(anterior)};
}

// Serie histórica de un ejercicio: una entrada por sesión donde se entrenó
function serieEjercicio(exId){
  return todasLasSesiones().map(s=>{
    const sets=s.sets.filter(x=>x.id===exId&&x.peso&&x.reps);
    if(!sets.length) return null;
    const mejor=sets.reduce((a,b)=>(a.peso*a.reps>=b.peso*b.reps?a:b));
    return {fecha:s.fechaFin||s.fecha,peso:mejor.peso,reps:mejor.reps,ton:tonelajeDeSets(sets)};
  }).filter(Boolean);
}

// Actualiza el récord de tonelaje (no solo peso×reps de un set) al cerrar sesión
function actualizarVolRecords(ses){
  const porEj={};
  ses.sets.forEach(s=>{ if(!s.peso||!s.reps) return; (porEj[s.id]=porEj[s.id]||[]).push(s); });
  Object.entries(porEj).forEach(([id,sets])=>{
    const ton=tonelajeDeSets(sets);
    const rec=S.volRecords[id];
    if(!rec||ton>rec.tonelaje) S.volRecords[id]={tonelaje:Math.round(ton),fecha:new Date().toISOString()};
  });
}

// Detecta estancamiento, progreso real o caída de rendimiento — un solo aviso, el más relevante
function notarObservacion(ex){
  const serie=serieEjercicio(ex.id);
  if(serie.length<3) return null;

  // 1) Estancamiento: cuántas sesiones lleva sin superar su mejor peso
  const pesos=serie.map(s=>s.peso);
  const max=Math.max(...pesos);
  const idxMax=pesos.lastIndexOf(max);
  const sesionesSinSuperar=serie.length-1-idxMax;
  if(sesionesSinSuperar>=3){
    return `📊 Llevas ${sesionesSinSuperar} sesiones sin superar ${max}kg en **${ex.nombre}**. Vale la pena ajustar reps, técnica o un deload corto.`;
  }

  // 2) Caída de rendimiento: última sesión bastante por debajo de la anterior
  const ult=serie[serie.length-1], prev=serie[serie.length-2];
  if(prev&&prev.ton>0&&ult.ton<prev.ton*0.85){
    return `🔻 Bajaste rendimiento en **${ex.nombre}** respecto a tu sesión anterior. ¿Dormiste bien o cambió algo?`;
  }

  // 3) Progreso real: tonelaje subiendo de forma sostenida en las últimas sesiones
  const ref=serie[Math.max(0,serie.length-6)];
  if(ref&&ref.ton>0){
    const pct=Math.round(((ult.ton-ref.ton)/ref.ton)*100);
    if(pct>=12) return `📈 Subiste ${pct}% de tonelaje en **${ex.nombre}** en tus últimas sesiones. Eso es progreso real, no casualidad.`;
  }
  return null;
}

// Sobrecarga: ¿esta semana hubo muchos más fallos que la anterior?
function detectarSobrecarga(){
  const ahora=Date.now(), semana=7*24*60*60*1000;
  let fallosActual=0,fallosAnterior=0;
  todasLasSesiones().forEach(s=>{
    const f=new Date(s.fecha).getTime();
    const n=s.sets.filter(x=>x.fallo).length;
    if(ahora-f<=semana) fallosActual+=n;
    else if(ahora-f<=semana*2) fallosAnterior+=n;
  });
  if(fallosAnterior>=2&&fallosActual>=fallosAnterior*1.8){
    return `⚠️ Reportaste muchos más fallos esta semana (${fallosActual}) que la anterior (${fallosAnterior}). Vigila el descanso — la fuerza se construye también fuera del gym.`;
  }
  return null;
}

// El cambio central: el objetivo se muestra ANTES del set, no después.
function sugerirObjetivo(ex,ses){
  const rr=ex.reps.toString().split('-');
  const rMin=parseInt(rr[0]), rMax=parseInt(rr[rr.length-1]);
  const setsHoy=ses.sets.filter(s=>s.id===ex.id);
  const numSet=setsHoy.length+1;

  if(setsHoy.length===0){
    const pr=S.prRecords[ex.id];
    if(!pr) return `🎯 Set 1: elige un peso con el que llegues justo a ${rMax} reps con buena técnica.`;
    if(pr.reps>=rMax) return `🎯 Set 1: prueba ${(pr.peso+2.5)}kg × ${rMin} — subiste de peso la vez pasada, ahora toca menos reps al inicio.`;
    return `🎯 Set 1: ${pr.peso}kg × ${pr.reps+1} — un rep más que tu última vez (${pr.peso}kg×${pr.reps}).`;
  }
  const last=setsHoy[setsHoy.length-1];
  if(!last.peso||!last.reps) return `🎯 Set ${numSet}: mismo peso que el anterior, prioriza técnica.`;
  return `🎯 Set ${numSet}: ${last.peso}kg × ${Math.min(last.reps,rMax)}+ — igual o más reps que el set anterior.`;
}

function showScreen(id){
  ['inicio','sesion','hist'].forEach(s=>{
    const el=document.getElementById('screen-'+s);
    el.style.display='none';
  });
  const target=document.getElementById('screen-'+id);
  target.style.display='flex';
  target.style.flexDirection='column';
  if(id==='hist') renderHist();
}

function toast(msg,dur=2200){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),dur);
}

  const mismodia=S.sesionActiva&&S.sesionActiva.dia===DIAS[new Date().getDay()]&&!S.sesionActiva.completada;

  const exList=rutina.ejercicios.slice(0,5).map((ex,i)=>{
    const pr=S.prRecords[ex.id];
    return `<div class="inicio-ex-row">
      <span class="inicio-ex-num">${String(i+1).padStart(2,'0')}</span>
      <span class="inicio-ex-name">${ex.nombre}</span>
      <span class="inicio-ex-detail">${ex.sets}×${ex.reps}</span>
    </div>`;
  }).join('')+(rutina.ejercicios.length>5?`<div style="font-size:8px;color:var(--r5);text-align:center;padding:6px">+${rutina.ejercicios.length-5} más</div>`:'');

  // Tonelaje semanal — progreso real visible antes de empezar, no solo al terminar
  const {actual,anterior}=tonelajeSemanal();
  const tonCard=actual>0?`
    <div class="inicio-rutina-card" style="padding:14px 16px">
      <div class="inicio-meta" style="margin-bottom:4px">TONELAJE ESTA SEMANA</div>
      <div style="font-size:22px;font-weight:700;color:var(--r9)">${actual.toLocaleString()}<span style="font-size:11px;color:var(--r5)"> kg</span></div>
      ${anterior>0?`<div style="font-size:9.5px;color:${actual>=anterior?'var(--red-dim)':'var(--r5)'}">${actual>=anterior?'▲':'▼'} ${Math.abs(Math.round(((actual-anterior)/anterior)*100))}% vs semana pasada</div>`:''}
    </div>`:'';

  el.innerHTML=`
    ${tonCard}
    <div class="inicio-rutina-card">
      <div class="inicio-dia">${DIAS[new Date().getDay()].toUpperCase()}</div>
      <div class="inicio-nombre">${rutina.nombre}</div>
      <div class="inicio-meta">${rutina.ejercicios.length} ejercicios · PPL x2</div>
      <div class="inicio-ex-preview">${exList}</div>
      ${mismodia
        ?`<button class="btn-start" onclick="retomarSesion()">↩ RETOMAR SESIÓN</button>`
        :`<button class="btn-start" onclick="iniciarSesion()">INICIAR SESIÓN →</button>`
      }
    </div>
    ${S.historialSesiones.length
      ?`<div style="font-size:8px;color:var(--r5);letter-spacing:.14em;text-align:center">${S.historialSesiones.length} sesiones registradas — <span style="color:var(--r6);cursor:pointer;text-decoration:underline" onclick="showScreen('hist')">ver historial</span></div>`
      :''
    }`;
}

// ═══════════════════════════════════════════════════════
// SESIÓN — arrancar
// ═══════════════════════════════════════════════════════
function iniciarSesion(){
  const rutina=getRutina();
  if(!rutina) return;
  S.sesionActiva={
    dia:DIAS[new Date().getDay()],
    rutina:rutina.nombre,
    fecha:new Date().toISOString(),
    ejercicioIdx:0,
    setActual:1,
    sets:[],
    completada:false,
  };
  guardar();
  document.getElementById('session-badge').classList.add('show');
  showScreen('sesion');
  renderEjercicio();

  // Saludo inicial del coach
  const ex=rutina.ejercicios[0];
  const pr=S.prRecords[ex.id];
  const msg=pr
    ?`Empezamos con ${ex.nombre}. Última vez: ${pr.peso}kg × ${pr.reps} reps. Ejecuta limpio.`
    :`Empezamos con ${ex.nombre}. Primera vez — elige un peso con el que puedas controlar todas las reps. Ejecuta limpio.`;
  setCoach(msg);
  const obs=notarObservacion(ex);
  if(obs) setCoach(obs);
}

function retomarSesion(){
  document.getElementById('session-badge').classList.add('show');
  showScreen('sesion');
  renderEjercicio();
  setCoach('Retomando donde quedaste. ¿Listo?');
}

// ═══════════════════════════════════════════════════════
// RENDER EJERCICIO — actualiza el panel fijo
// ═══════════════════════════════════════════════════════
function renderEjercicio(){
  const ses=S.sesionActiva;
  if(!ses) return;
  const rutina=RUTINA[ses.dia];
  if(!rutina) return;
  const ex=rutina.ejercicios[ses.ejercicioIdx];
  if(!ex) return;

  // Header
  document.getElementById('hdr-sub').textContent=`${ses.rutina} · EJ ${ses.ejercicioIdx+1}/${rutina.ejercicios.length}`;

  // Card ejercicio
  const card=document.getElementById('ex-card');
  card.style.display='block';

  // Imagen — fuente estable precargada, sin API de pago
  const gifWrap=document.getElementById('ex-gif-wrap');
  const url=getExerciseImage(ex);
  gifWrap.innerHTML=`<img class="ex-gif" src="${url}" alt="${ex.nombre}" loading="lazy"
    onerror="this.parentElement.innerHTML='<div class=ex-gif-placeholder>💪</div>'">`;

  // Info
  document.getElementById('ex-eyebrow').textContent=`EJ ${ses.ejercicioIdx+1}/${rutina.ejercicios.length} · ${ex.musculo.toUpperCase()}`;
  document.getElementById('ex-name').textContent=ex.nombre;
  document.getElementById('ex-meta').textContent=`${ex.equipo} · ${ex.sets} series × ${ex.reps} reps · ${ex.descanso}s descanso`;
  document.getElementById('ex-tip').textContent=TIPS[ex.id]?'💡 '+TIPS[ex.id]:'';
  document.getElementById('ex-target').textContent=sugerirObjetivo(ex,ses);

  // Dots
  const dots=document.getElementById('ex-dots');
  dots.innerHTML='';
  for(let i=1;i<=ex.sets;i++){
    const d=document.createElement('div');
    d.className='ex-dot'+(i<ses.setActual?' done':i===ses.setActual?' now':'');
    dots.appendChild(d);
  }

  // Chips
  const pr=S.prRecords[ex.id];
  const volPr=S.volRecords[ex.id];
  document.getElementById('ex-chips').innerHTML=
    `<span class="chip">Set ${ses.setActual}/${ex.sets}</span>`
    +(pr?`<span class="chip red">PR ${pr.peso}kg×${pr.reps}</span>`:'')
    +(volPr?`<span class="chip">Vol. PR ${volPr.tonelaje}kg</span>`:'');

  // Historial de sets del ejercicio actual en esta sesión
  const setsDeEste=ses.sets.filter(s=>s.id===ex.id);
  const histWrap=document.getElementById('sets-hist-wrap');
  const histEl=document.getElementById('sets-hist');
  if(setsDeEste.length){
    histWrap.style.display='block';
    histEl.innerHTML=setsDeEste.map(s=>
      `<span class="hist-chip">${s.peso?s.peso+'kg':''} ${s.reps?'× '+s.reps:''}</span>`
    ).join('');
  } else {
    histWrap.style.display='none';
  }

  // Mostrar botones, ocultar timer
  document.getElementById('set-btns').classList.add('show');
  document.getElementById('timer-card').classList.remove('show');

  document.getElementById('sesion-body').scrollTop=0;
}

// ═══════════════════════════════════════════════════════
// COACH — hilo real con scroll, burbujas de Roma y del usuario
// ═══════════════════════════════════════════════════════
function _fmtMsg(txt){
  return txt.replace(/\*\*(.*?)\*\*/g,'<strong style="color:var(--r9)">$1</strong>').replace(/\n/g,'<br>');
}
function renderCoachThread(){
  const wrap=document.getElementById('coach-thread');
  const tag='<span class="coach-tag">ROMA</span>';
  wrap.innerHTML=tag+S.coachLog.slice(-30).map(m=>
    `<div class="coach-msg ${m.role}">${_fmtMsg(m.text)}</div>`
  ).join('');
  wrap.scrollTop=wrap.scrollHeight;
}
function addCoachMsg(txt){
  hideTyping();
  S.coachLog.push({role:'roma',text:txt,ts:Date.now()});
  if(S.coachLog.length>60) S.coachLog=S.coachLog.slice(-60);
  renderCoachThread();
  guardar();
}
function addUserMsg(txt){
  S.coachLog.push({role:'user',text:txt,ts:Date.now()});
  if(S.coachLog.length>60) S.coachLog=S.coachLog.slice(-60);
  renderCoachThread();
}
function showTyping(){
  const t=document.getElementById('coach-typing');
  t.style.display='block';
  const wrap=document.getElementById('coach-thread');
  wrap.scrollTop=wrap.scrollHeight;
}
function hideTyping(){ document.getElementById('coach-typing').style.display='none'; }
// Mantiene compatibilidad con el resto del código: setCoach() ahora agrega
// un mensaje nuevo al hilo en vez de reemplazar la única burbuja que había.
function setCoach(txt){ addCoachMsg(txt); }

// ═══════════════════════════════════════════════════════
// LOG SET — el corazón del flujo
// ═══════════════════════════════════════════════════════
let _esperandoPeso=false;
let _lastTipo='ok';
let _timerInterval=null;

function logSet(tipo){
  const ses=S.sesionActiva;
  if(!ses) return;
  const rutina=RUTINA[ses.dia];
  const ex=rutina.ejercicios[ses.ejercicioIdx];

  _lastTipo=tipo;
  _esperandoPeso=true;

  // Ocultar botones mientras descansa
  document.getElementById('set-btns').classList.remove('show');

  // Arrancar timer INMEDIATAMENTE
  iniciarTimer(ex.descanso);

  // Mensaje según tipo
  const msgs={
    ok:'Timer corriendo. Escribe el peso y reps (ej: 80kg 9 reps).',
    up:'Subiste peso. Timer corriendo. ¿A cuánto y cuántas reps?',
    dn:'Bajaste peso. Timer corriendo. ¿A cuánto y cuántas reps?'
  };
  setCoach(msgs[tipo]);

  // Placeholder del input
  document.getElementById('inp').placeholder='ej: 80kg 9 reps';
  document.getElementById('inp').focus();
}

// ═══════════════════════════════════════════════════════
// TIMER
// ═══════════════════════════════════════════════════════
function iniciarTimer(segs){
  detenerTimer();
  const card=document.getElementById('timer-card');
  const numEl=document.getElementById('timer-num');
  const ofEl=document.getElementById('timer-of');
  const fillEl=document.getElementById('timer-fill');

  card.classList.add('show');
  let rest=segs;
  const total=segs;
  const fmt=s=>`${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
  numEl.textContent=fmt(rest);
  ofEl.textContent=`DE ${fmt(total)}`;
  fillEl.style.width='100%';

  _timerInterval=setInterval(()=>{
    rest--;
    numEl.textContent=fmt(Math.max(0,rest));
    fillEl.style.width=`${Math.max(0,(rest/total)*100)}%`;
    if(rest<=0){
      detenerTimer();
      card.classList.remove('show');
      if(!_esperandoPeso){
        avanzarSet();
      } else {
        setCoach('⏱ Descanso terminado. Reporta tu set cuando puedas.');
      }
    }
  },1000);
}

function detenerTimer(){
  if(_timerInterval){clearInterval(_timerInterval);_timerInterval=null;}
}

// ═══════════════════════════════════════════════════════
// PROCESAR REPORTE DE SET
// ═══════════════════════════════════════════════════════
function procesarReporte(txt){
  const ses=S.sesionActiva;
  if(!ses) return false;
  const rutina=RUTINA[ses.dia];
  const ex=rutina.ejercicios[ses.ejercicioIdx];

  const mPeso=txt.match(/(\d+(?:[.,]\d+)?)\s*(?:kg|kilo)/i);
  const mReps=txt.match(/(\d+)\s*(?:reps?|rep|repeticiones?)/i)
    ||txt.match(/[×x]\s*(\d+)/i)
    ||txt.match(/hice\s+(\d+)/i)
    ||(!mPeso&&/^\d+$/.test(txt.trim())&&txt.match(/(\d+)/));

  if(!mPeso&&!mReps) return false;

  const peso=mPeso?parseFloat(mPeso[1].replace(',','.')):null;
  const reps=mReps?parseInt(mReps[1]):null;
  const fallo=/(fallo|fall[eé]|no pude|l[ií]mite)/i.test(txt);

  // Guardar set
  ses.sets.push({id:ex.id,set:ses.setActual,peso,reps,fallo,tipo:_lastTipo,f:new Date().toISOString()});

  // PR
  if(peso&&reps){
    const pr=S.prRecords[ex.id];
    if(!pr||peso*reps>pr.peso*pr.reps)
      S.prRecords[ex.id]={peso,reps,fecha:new Date().toISOString()};
  }

  // Feedback inmediato (sin esperar IA)
  const rr=ex.reps.toString().split('-');
  const rMin=parseInt(rr[0]),rMax=parseInt(rr[rr.length-1]);
  let fb='';
  const esPR=peso&&reps&&S.prRecords[ex.id]?.peso===peso&&S.prRecords[ex.id]?.reps===reps;
  if(esPR) fb='**Nuevo PR.** ';
  if(fallo&&reps&&reps<rMin-2) fb+='Llegaste al fallo pronto — baja 2-5kg en el siguiente. ';
  else if(reps&&reps>rMax+2) fb+='Estuvo ligero — sube 2-5kg en el siguiente. ';
  else fb+='Bien ejecutado. ';
  if(peso&&reps) fb+=`${peso}kg × ${reps} reps registrados.`;

  _esperandoPeso=false;
  document.getElementById('inp').placeholder='Escribe peso y reps, o pregunta algo…';
  setCoach(fb);

  // Guardar historial de conversación para Roma (cerebro)
  S.romaHist.push({r:'user',t:txt});
  S.romaHist.push({r:'roma',t:fb});
  if(S.romaHist.length>40) S.romaHist=S.romaHist.slice(-40);

  guardar();

  // Si timer ya terminó, avanzar
  if(!_timerInterval) setTimeout(()=>avanzarSet(),1500);

  // Actualizar historial visible de sets
  renderSetsHist(ex);

  return true;
}

function renderSetsHist(ex){
  const ses=S.sesionActiva;
  if(!ses) return;
  const setsDeEste=ses.sets.filter(s=>s.id===ex.id);
  const histWrap=document.getElementById('sets-hist-wrap');
  const histEl=document.getElementById('sets-hist');
  if(setsDeEste.length){
    histWrap.style.display='block';
    histEl.innerHTML=setsDeEste.map(s=>
      `<span class="hist-chip">${s.peso?s.peso+'kg':''} ${s.reps?'× '+s.reps:''}</span>`
    ).join('');
  }
  // Scroll para ver chips
  document.getElementById('sesion-body').scrollTop=999;
  setTimeout(()=>document.getElementById('sesion-body').scrollTop=0,800);
}

// ═══════════════════════════════════════════════════════
// AVANZAR SET / EJERCICIO
// ═══════════════════════════════════════════════════════
function avanzarSet(){
  const ses=S.sesionActiva;
  if(!ses) return;
  const rutina=RUTINA[ses.dia];
  const ex=rutina.ejercicios[ses.ejercicioIdx];

  ses.setActual++;

  if(ses.setActual>ex.sets){
    ses.ejercicioIdx++;
    ses.setActual=1;
    if(ses.ejercicioIdx>=rutina.ejercicios.length){
      completarSesion();
      return;
    }
    const sig=rutina.ejercicios[ses.ejercicioIdx];
    const pr=S.prRecords[sig.id];
    setCoach(`✅ **${ex.nombre}** listo.\n\nSiguiente: **${sig.nombre}** — ${sig.sets}×${sig.reps}\n${pr?`Última vez: ${pr.peso}kg × ${pr.reps}.`:'Primera vez con este.'}`);
    const obs=notarObservacion(sig);
    if(obs) setCoach(obs);
  }

  guardar();
  renderEjercicio();
}

function completarSesion(){
  const ses=S.sesionActiva;
  ses.completada=true;ses.fechaFin=new Date().toISOString();
  actualizarVolRecords(ses);
  S.historialSesiones.push({...ses});
  S.sesionActiva=null;
  document.getElementById('session-badge').classList.remove('show');
  document.getElementById('hdr-sub').textContent='Sesión completada 🔥';
  document.getElementById('ex-card').style.display='none';
  document.getElementById('set-btns').classList.remove('show');
  document.getElementById('timer-card').classList.remove('show');
  const {actual,anterior}=tonelajeSemanal();
  const cmpTon=anterior>0?` Tonelaje semanal: ${actual}kg (${actual>=anterior?'+':''}${Math.round(((actual-anterior)/anterior)*100)}% vs semana pasada).`:'';
  setCoach('🔥 **Sesión completa.** Excelente trabajo — Roma registró todo.'+cmpTon);
  const sobrecarga=detectarSobrecarga();
  if(sobrecarga) setCoach(sobrecarga);
  guardar();
  toast('🔥 Sesión completada');
}

// ═══════════════════════════════════════════════════════
// INPUT — peso/reps O pregunta libre a Roma IA
// ═══════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════
// PERSONALIDAD DE ROMA — capa 1: el "alma", siempre va en el prompt,
// pero es corta. No es una lista de reglas frías, es un retrato.
// ═══════════════════════════════════════════════════════
const PERSONALIDAD=`Eres Roma, el coach personal de Rodrigo. Lo conoces sesión por sesión — sus PRs, sus rachas, dónde se estanca. Hablas como alguien que quiere verlo progresar, no como un sargento ni como un cartel motivacional vacío. Celebras lo real (un PR, una subida de tonelaje, una racha) y eres honesta cuando algo no va bien, sin dureza gratuita. Sabes de sobrecarga progresiva, técnica y periodización, y lo usas para dar consejos específicos a él, no genéricos. Hablas español, cercana, sin relleno ni emojis de más.`;

// ═══════════════════════════════════════════════════════
// MANUAL DE ROMA — capa 2: la "base de datos" de coaching.
// Vive en el código, NO se manda completa en cada llamada — eso
// costaría tokens de más en cada mensaje. En vez de eso, una función
// local (sin IA, gratis) elige solo el fragmento relevante al momento.
// ═══════════════════════════════════════════════════════
const ROMA_MANUAL={
  sobrecarga:'Principio de sobrecarga progresiva: cada ejercicio necesita más estímulo con el tiempo —más peso, más reps o más series, casi nunca las tres a la vez. Si lleva 2+ sesiones sin mover ninguna, hay que ajustar algo.',
  rpe:'RPE/RIR: la mayoría de series deben dejar 1-2 reps en reserva (RPE 8-9). Llegar al fallo en todo no es más efectivo, solo más fatiga.',
  deload:'Si el rendimiento cae varias sesiones seguidas en distintos ejercicios a la vez, es fatiga acumulada, no falta de esfuerzo — toca una semana ligera, no más intensidad.',
};
function getManualSnippet(ses){
  if(ses){
    const ex=RUTINA[ses.dia]?.ejercicios[ses.ejercicioIdx];
    if(ex&&notarObservacion(ex)) return ROMA_MANUAL.deload;
  }
  return ROMA_MANUAL.sobrecarga+' '+ROMA_MANUAL.rpe;
}

function quickAsk(txt){
  document.getElementById('inp').value=txt;
  sendMsg();
}

async function sendMsg(){
  const inp=document.getElementById('inp');
  const txt=inp.value.trim();
  if(!txt) return;
  inp.value='';
  addUserMsg(txt);

  // Si estamos esperando reporte, intentar procesar
  if(_esperandoPeso&&S.sesionActiva){
    if(procesarReporte(txt)) return;
  }

  // Pregunta libre — llamar Roma IA con historial completo (cerebro con memoria)
  showTyping();
  try{
    const ses=S.sesionActiva;
    const sesCtx=ses
      ?`SESIÓN ACTIVA: ${ses.rutina}, ejercicio ${ses.ejercicioIdx+1}, set ${ses.setActual}/${RUTINA[ses.dia]?.ejercicios[ses.ejercicioIdx]?.sets||'?'}. Sets completados hoy: ${ses.sets.length}.`
      :'Sin sesión activa ahora mismo.';
    const prCtx=Object.keys(S.prRecords).length
      ?'PRs: '+Object.entries(S.prRecords).slice(0,8).map(([id,p])=>`${id.replace(/_/g,' ')}: ${p.peso}kg×${p.reps}`).join(', ')
      :'Sin PRs aún.';

    const system=`${PERSONALIDAD}

PERFIL: Peso 106kg, meta 85kg. Nivel avanzado. PPL x2 semanal. Equipo: máquinas y poleas. Prioridad: hombros anchos, espalda en V, bíceps.

${sesCtx}
${prCtx}

PRINCIPIO RELEVANTE AHORA: ${getManualSnippet(ses)}

REGLAS:
- Ajusta el largo a la situación: corto y directo durante un set, más completo si te hacen una pregunta real
- Nunca digas "no tengo interfaz visual" — tú eres el coach, la UI es otra cosa
- Nunca pidas datos que ya tienes en el contexto
- Si te reportan un set, da feedback específico sobre peso/reps
- Siempre sabes en qué ejercicio y set va Rodrigo`;

    // Incluir historial de conversación (cerebro con memoria)
    S.romaHist.push({r:'user',t:txt});
    if(S.romaHist.length>40) S.romaHist=S.romaHist.slice(-40);

    const contents=S.romaHist.slice(-12).map(h=>({
      role:h.r==='roma'?'model':'user',
      parts:[{text:h.t}]
    }));

    const resp=await vertexGenerate(system,contents,300,0.8);
    S.romaHist.push({r:'roma',t:resp});
    if(S.romaHist.length>40) S.romaHist=S.romaHist.slice(-40);
    guardar();
    addCoachMsg(resp);
  }catch(e){
    addCoachMsg('Sin conexión. Sigue — Roma vuelve pronto.');
    console.warn('[Roma]',e);
  }
}

// ═══════════════════════════════════════════════════════
// HISTORIAL
// ═══════════════════════════════════════════════════════
function renderHist(){
  const el=document.getElementById('hist-content');
  if(!S.historialSesiones.length){
    el.innerHTML=`<div style="font-size:12px;color:var(--r5);text-align:center;padding:40px 0">Aún no hay sesiones registradas.</div>`;
    return;
  }
  el.innerHTML=[...S.historialSesiones].reverse().map(ses=>{
    const fecha=new Date(ses.fecha).toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'short'});
    const dur=ses.fechaFin?Math.round((new Date(ses.fechaFin)-new Date(ses.fecha))/60000)+'min':'—';
    const setsResumen=ses.sets.map(s=>`<div class="hist-ex-item">${s.id.replace(/_/g,' ')} · Set ${s.set}: ${s.peso?s.peso+'kg':'—'} ${s.reps?'× '+s.reps+'reps':''}</div>`).join('');
    return `<div class="hist-sesion-card">
      <div class="hist-sesion-fecha">${fecha.toUpperCase()} · ${dur}</div>
      <div class="hist-sesion-rutina">${ses.rutina}</div>
      ${setsResumen||'<div class="hist-ex-item" style="color:var(--r4)">Sin sets registrados</div>'}
    </div>`;
  }).join('');
}

// INIT
// ═══════════════════════════════════════════════════════
(async function init(){
  try{ await dbOpen(); await cargar(); }catch(e){ console.warn('DB no disponible',e); }

  // Restaurar sesión activa si existe y es del día de hoy
  if(S.sesionActiva&&!S.sesionActiva.completada&&S.sesionActiva.dia===DIAS[new Date().getDay()]){
    document.getElementById('session-badge').classList.add('show');
  }

  renderInicio();
  renderCoachThread();
  showScreen('inicio');

  // PWA — solo cache local, sin pedir ningún permiso al usuario
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js').catch(e=>console.warn('SW no registrado (¿se abrió como file:// ?)',e));
  }
})();
